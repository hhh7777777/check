<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>新加坡国立大学广州研究院</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-deep:#070e1a;
  --bg-mid:#0c1a2e;
  --bg-surface:rgba(255,255,255,0.05);
  --bg-card:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.1);
  --blue:#3a8aee;
  --blue-deep:#1e40af;
  --orange:#f59e0b;
  --orange-glow:rgba(245,158,11,0.25);
  --white:#ffffff;
  --text-secondary:rgba(255,255,255,0.55);
  --text-tertiary:rgba(255,255,255,0.3);
  --radius:16px;
}
html{font-size:16px}
body{
  font-family:'Noto Sans SC','DM Sans',sans-serif;
  background:var(--bg-deep);
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
/* ===== 背景装饰 ===== */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-circle{position:absolute;border-radius:50%;filter:blur(100px)}
.bg-c1{width:500px;height:500px;background:rgba(58,138,238,0.08);top:-150px;right:-120px}
.bg-c2{width:350px;height:350px;background:rgba(245,158,11,0.06);bottom:100px;left:-100px}
.bg-c3{width:250px;height:250px;background:rgba(58,138,238,0.05);top:40%;left:50%}
.bg-line{position:absolute;width:300px;height:1px;background:linear-gradient(90deg,transparent,rgba(245,158,11,0.3),transparent);transform:rotate(-25deg)}
.bg-l1{top:15%;right:5%}
.bg-l2{top:22%;right:12%;width:180px;background:linear-gradient(90deg,transparent,rgba(58,138,238,0.25),transparent)}

/* ===== 容器 ===== */
.container{
  position:relative;z-index:1;
  max-width:480px;margin:0 auto;
  min-height:100vh;
  display:flex;flex-direction:column;
  padding:0 24px;
}

/* ===== 头部 ===== */
.header{
  padding-top:calc(env(safe-area-inset-top,0px) + 40px);
  text-align:center;
  margin-bottom:48px;
}
.header-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.25);
  border-radius:20px;padding:4px 14px;margin-bottom:16px;
  font-size:11px;color:var(--orange);letter-spacing:1px;text-transform:uppercase;
  font-family:'DM Sans',sans-serif;font-weight:700;
}
.header-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--orange);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.header h1{
  font-size:28px;font-weight:900;letter-spacing:1px;
  line-height:1.3;
  background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,0.8) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.header .subtitle{
  font-size:13px;color:var(--text-secondary);margin-top:8px;
  font-family:'DM Sans',sans-serif;letter-spacing:2px;
}

/* ===== 语言切换 ===== */
.lang-switch{
  display:flex;justify-content:center;gap:4px;margin-bottom:32px;
}
.lang-btn{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:8px;padding:6px 16px;
  font-size:12px;color:var(--text-secondary);cursor:pointer;
  transition:all .3s;font-family:'DM Sans',sans-serif;
}
.lang-btn.active{
  background:rgba(58,138,238,0.15);border-color:rgba(58,138,238,0.4);
  color:var(--blue);
}

/* ===== 表单 ===== */
.query-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:28px 20px;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  margin-bottom:24px;
}
.form-label{
  font-size:13px;color:var(--text-secondary);margin-bottom:12px;
  font-weight:500;
}
.form-input{
  width:100%;height:52px;
  background:rgba(255,255,255,0.06);
  border:1px solid var(--border);
  border-radius:12px;
  padding:0 16px;
  font-size:16px;color:var(--white);
  font-family:'DM Sans','Noto Sans SC',sans-serif;
  letter-spacing:1px;
  outline:none;transition:all .3s;
  -webkit-appearance:none;
}
.form-input:focus{
  border-color:rgba(58,138,238,0.5);
  box-shadow:0 0 0 3px rgba(58,138,238,0.1);
}
.form-input::placeholder{color:var(--text-tertiary);letter-spacing:0}
.form-row{display:flex;gap:12px;margin-bottom:16px}
.form-row .form-input{flex:1}

.query-btn{
  width:100%;height:52px;
  background:linear-gradient(135deg,var(--blue-deep),var(--blue));
  border:none;border-radius:12px;
  font-size:16px;font-weight:700;color:var(--white);
  letter-spacing:4px;cursor:pointer;
  transition:all .3s;
  box-shadow:0 8px 24px rgba(30,64,175,0.3);
  position:relative;overflow:hidden;
  font-family:'Noto Sans SC',sans-serif;
}
.query-btn:active{transform:scale(0.97);box-shadow:0 4px 12px rgba(30,64,175,0.3)}
.query-btn:disabled{
  background:rgba(255,255,255,0.08);
  box-shadow:none;color:var(--text-tertiary);
  cursor:not-allowed;
}
.query-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);
  transform:translateX(-100%);
}
.query-btn:not(:disabled):active::after{animation:shimmer .6s}
@keyframes shimmer{to{transform:translateX(100%)}}

.query-btn.loading{pointer-events:none}
.query-btn.loading::before{
  content:'';display:inline-block;width:16px;height:16px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin .6s linear infinite;
  margin-right:8px;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== 查询模式切换 ===== */
.mode-tabs{
  display:flex;gap:4px;margin-bottom:20px;
  background:rgba(255,255,255,0.04);border-radius:10px;padding:3px;
}
.mode-tab{
  flex:1;text-align:center;padding:8px 0;
  font-size:13px;color:var(--text-secondary);
  border-radius:8px;cursor:pointer;transition:all .3s;
}
.mode-tab.active{
  background:rgba(58,138,238,0.15);color:var(--blue);font-weight:600;
}

/* ===== 结果卡片 ===== */
.result-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:24px 20px;
  backdrop-filter:blur(20px);
  display:none;
  animation:slideUp .4s ease;
}
.result-card.show{display:block}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

.result-header{
  display:flex;align-items:center;gap:12px;
  margin-bottom:20px;padding-bottom:16px;
  border-bottom:1px solid var(--border);
}
.result-avatar{
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue-deep),var(--blue));
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:900;color:var(--white);flex-shrink:0;
}
.result-name{font-size:20px;font-weight:700}
.result-org{font-size:13px;color:var(--text-secondary);margin-top:2px}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.info-item{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:10px;padding:12px 14px;
}
.info-label{font-size:11px;color:var(--text-tertiary);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.info-value{font-size:15px;font-weight:600;color:var(--white);word-break:break-all}
.info-value.accent{color:var(--orange)}
.info-item.full{grid-column:1/-1}

.status-tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;
}
.status-tag.checked{background:rgba(16,185,129,0.15);color:#10b981}
.status-tag.unchecked{background:rgba(245,158,11,0.15);color:var(--orange)}
.status-tag::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}

/* ===== 日程 ===== */
.schedule-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:24px 20px;
  margin-top:16px;
  display:none;
}
.schedule-card.show{display:block;animation:slideUp .4s ease .1s both}
.schedule-title{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--white)}
.schedule-item{
  display:flex;gap:12px;
  padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.schedule-item:last-child{border:none}
.schedule-time{
  flex-shrink:0;width:80px;
  font-size:12px;color:var(--blue);
  font-family:'DM Sans',sans-serif;font-weight:700;
  padding-top:2px;
}
.schedule-info .sch-title{font-size:14px;font-weight:600;color:var(--white);margin-bottom:2px}
.schedule-info .sch-sub{font-size:12px;color:var(--text-secondary)}

/* ===== 错误提示 ===== */
.error-msg{
  background:rgba(239,68,68,0.1);
  border:1px solid rgba(239,68,68,0.2);
  border-radius:var(--radius);
  padding:20px;
  text-align:center;
  color:#f87171;font-size:14px;
  display:none;
}
.error-msg.show{display:block;animation:slideUp .4s ease}

/* ===== 底部 ===== */
.footer{
  margin-top:auto;
  padding:32px 0 calc(env(safe-area-inset-bottom,0px) + 24px);
  text-align:center;
}
.footer-line{width:60px;height:1px;background:var(--border);margin:0 auto 12px}
.footer-text{font-size:11px;color:var(--text-tertiary);letter-spacing:1px}

/* ===== loading overlay ===== */
.overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(7,14,26,0.8);
  display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
.overlay.show{display:flex}
.spinner{
  width:40px;height:40px;
  border:3px solid rgba(255,255,255,0.1);
  border-top-color:var(--blue);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-circle bg-c1"></div>
  <div class="bg-circle bg-c2"></div>
  <div class="bg-circle bg-c3"></div>
  <div class="bg-line bg-l1"></div>
  <div class="bg-line bg-l2"></div>
</div>

<div class="container">
  <header class="header">
    <div class="header-badge"><span id="badgeText">ATTENDEE INFO</span></div>
    <h1 id="mainTitle">新加坡国立大学广州研究院</h1>
    <p class="subtitle" id="headerSubtitle">EVENT ATTENDEE SERVICE</p>
  </header>

  <div class="lang-switch">
    <button class="lang-btn active" onclick="setLang('zh')">中文</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
  </div>

  <div class="query-card">
    <div class="mode-tabs" id="modeTabs">
      <div class="mode-tab active" onclick="switchMode('phone')" id="tabPhone">手机号查询</div>
      <div class="mode-tab" onclick="switchMode('name')" id="tabName">姓名+尾号</div>
    </div>

    <!-- 手机号查询 -->
    <div id="phoneForm">
      <div class="form-label" id="labelPhone">请输入您报名时使用的手机号</div>
      <input class="form-input" type="tel" id="phoneInput" placeholder="Phone Number" maxlength="20" autocomplete="tel">
    </div>

    <!-- 姓名+尾号查询 -->
    <div id="nameForm" style="display:none">
      <div class="form-label" id="labelName">请输入姓名和手机号后四位</div>
      <div class="form-row">
        <input class="form-input" type="text" id="nameInput" placeholder="Name" autocomplete="name">
        <input class="form-input" type="tel" id="last4Input" placeholder="****" maxlength="4" style="max-width:100px">
      </div>
    </div>

    <button class="query-btn" id="queryBtn" onclick="doQuery()" disabled>
      <span id="btnText">立 即 查 询</span>
    </button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-avatar" id="avatarText">?</div>
      <div>
        <div class="result-name" id="resultName">-</div>
        <div class="result-org" id="resultOrg">-</div>
      </div>
    </div>
    <div class="info-grid">
      <div class="info-item">
        <div class="info-label" id="lblIdentity">IDENTITY</div>
        <div class="info-value" id="resultIdentity">-</div>
      </div>
      <div class="info-item">
        <div class="info-label" id="lblStatus">STATUS</div>
        <div class="info-value" id="resultStatus">-</div>
      </div>
      <div class="info-item" id="seatItem" style="display:none">
        <div class="info-label" id="lblSeat">SEAT</div>
        <div class="info-value accent" id="resultSeat">-</div>
      </div>
      <div class="info-item" id="tableItem" style="display:none">
        <div class="info-label" id="lblTable">TABLE</div>
        <div class="info-value accent" id="resultTable">-</div>
      </div>
      <div class="info-item" id="hotelItem" style="display:none">
        <div class="info-label" id="lblHotel">HOTEL</div>
        <div class="info-value" id="resultHotel">-</div>
      </div>
      <div class="info-item" id="roomItem" style="display:none">
        <div class="info-label" id="lblRoom">ROOM</div>
        <div class="info-value" id="resultRoom">-</div>
      </div>
      <div class="info-item" id="diningItem" style="display:none">
        <div class="info-label" id="lblDining">DINING</div>
        <div class="info-value" id="resultDining">-</div>
      </div>
    </div>
  </div>

  <div class="schedule-card" id="scheduleCard">
    <div class="schedule-title" id="schTitle">📋 日程安排</div>
    <div id="scheduleList"></div>
  </div>

  <footer class="footer">
    <div class="footer-line"></div>
    <div class="footer-text">NUS GZRI © 2026</div>
  </footer>
</div>

<div class="overlay" id="overlay"><div class="spinner"></div></div>

<script>
// ===== 配置 =====
const API_BASE = '' // 同域部署，空即可

// ===== 国际化 =====
const i18n = {
  zh: {
    badge: '参会信息查询',
    title: '新加坡国立大学广州研究院',
    subtitle: 'EVENT ATTENDEE SERVICE',
    tabPhone: '手机号查询',
    tabName: '姓名+尾号',
    labelPhone: '请输入您报名时使用的手机号',
    labelName: '请输入姓名和手机号后四位',
    placeholderPhone: '请输入手机号',
    placeholderName: '请输入姓名',
    placeholderLast4: '后四位',
    btnQuery: '立 即 查 询',
    btnLoading: '查询中...',
    identity: '身份类型',
    status: '签到状态',
    checked: '已签到',
    unchecked: '未签到',
    seat: '座位号',
    table: '餐桌号',
    hotel: '酒店',
    room: '房间号',
    dining: '用餐地点',
    schedule: '📋 日程安排',
    errPhone: '请输入完整的手机号',
    errName: '请输入姓名',
    errLast4: '请输入4位手机号后四位',
    errNotFound: '未查询到参会信息，请确认手机号是否正确',
    errNetwork: '网络错误，请稍后重试',
  },
  en: {
    badge: 'ATTENDEE INFO',
    title: 'NUS Guangzhou Research Institute',
    subtitle: 'EVENT ATTENDEE SERVICE',
    tabPhone: 'Phone',
    tabName: 'Name + Last 4',
    labelPhone: 'Enter the phone number you registered with',
    labelName: 'Enter your name and last 4 digits of phone number',
    placeholderPhone: 'Phone Number',
    placeholderName: 'Your Name',
    placeholderLast4: '****',
    btnQuery: 'SEARCH',
    btnLoading: 'Searching...',
    identity: 'IDENTITY',
    status: 'STATUS',
    checked: 'Checked In',
    unchecked: 'Not Checked In',
    seat: 'SEAT',
    table: 'TABLE',
    hotel: 'HOTEL',
    room: 'ROOM',
    dining: 'DINING',
    schedule: '📋 Schedule',
    errPhone: 'Please enter a valid phone number',
    errName: 'Please enter your name',
    errLast4: 'Please enter 4 digits',
    errNotFound: 'No attendee found. Please check your phone number.',
    errNetwork: 'Network error. Please try again later.',
  }
}
let lang = 'zh'
let queryMode = 'phone'

function setLang(l) {
  lang = l
  document.querySelectorAll('.lang-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && l === 'zh') || (i === 1 && l === 'en'))
  })
  applyLang()
}

function applyLang() {
  const t = i18n[lang]
  document.getElementById('badgeText').textContent = t.badge
  document.getElementById('mainTitle').textContent = t.title
  document.getElementById('headerSubtitle').textContent = t.subtitle
  document.getElementById('tabPhone').textContent = t.tabPhone
  document.getElementById('tabName').textContent = t.tabName
  document.getElementById('labelPhone').textContent = t.labelPhone
  document.getElementById('labelName').textContent = t.labelName
  document.getElementById('phoneInput').placeholder = t.placeholderPhone
  document.getElementById('nameInput').placeholder = t.placeholderName
  document.getElementById('last4Input').placeholder = t.placeholderLast4
  document.getElementById('lblIdentity').textContent = t.identity
  document.getElementById('lblStatus').textContent = t.status
  document.getElementById('lblSeat').textContent = t.seat
  document.getElementById('lblTable').textContent = t.table
  document.getElementById('lblHotel').textContent = t.hotel
  document.getElementById('lblRoom').textContent = t.room
  document.getElementById('lblDining').textContent = t.dining
  document.getElementById('schTitle').textContent = t.schedule
  document.title = t.title
}

function switchMode(mode) {
  queryMode = mode
  document.getElementById('tabPhone').classList.toggle('active', mode === 'phone')
  document.getElementById('tabName').classList.toggle('active', mode === 'name')
  document.getElementById('phoneForm').style.display = mode === 'phone' ? '' : 'none'
  document.getElementById('nameForm').style.display = mode === 'name' ? '' : 'none'
  document.getElementById('resultCard').classList.remove('show')
  document.getElementById('scheduleCard').classList.remove('show')
  document.getElementById('errorMsg').classList.remove('show')
  updateBtnState()
}

// ===== 按钮状态 =====
document.getElementById('phoneInput').addEventListener('input', updateBtnState)
document.getElementById('nameInput').addEventListener('input', updateBtnState)
document.getElementById('last4Input').addEventListener('input', updateBtnState)

function updateBtnState() {
  let ready = false
  if (queryMode === 'phone') {
    ready = document.getElementById('phoneInput').value.length >= 6
  } else {
    ready = document.getElementById('nameInput').value.trim().length > 0 && document.getElementById('last4Input').value.length === 4
  }
  document.getElementById('queryBtn').disabled = !ready
}

// ===== 查询 =====
async function doQuery() {
  const t = i18n[lang]
  const btn = document.getElementById('queryBtn')
  const btnText = document.getElementById('btnText')

  let payload = {}
  if (queryMode === 'phone') {
    const phone = document.getElementById('phoneInput').value.trim()
    if (phone.length < 6) { showError(t.errPhone); return }
    payload = { phone }
  } else {
    const name = document.getElementById('nameInput').value.trim()
    const last4 = document.getElementById('last4Input').value.trim()
    if (!name) { showError(t.errName); return }
    if (last4.length !== 4) { showError(t.errLast4); return }
    payload = { name, phoneLast4: last4 }
  }

  btn.classList.add('loading')
  btn.disabled = true
  btnText.textContent = t.btnLoading
  document.getElementById('overlay').classList.add('show')
  document.getElementById('resultCard').classList.remove('show')
  document.getElementById('scheduleCard').classList.remove('show')
  document.getElementById('errorMsg').classList.remove('show')

  try {
    const resp = await fetch(API_BASE + '/api/h5/queryAttendee', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    const data = await resp.json()

    if (data.code === 200 && data.data) {
      showResult(data.data)
      loadSchedules()
    } else {
      showError(t.errNotFound)
    }
  } catch (err) {
    console.error(err)
    showError(t.errNetwork)
  } finally {
    btn.classList.remove('loading')
    btn.disabled = false
    btnText.textContent = t.btnQuery
    document.getElementById('overlay').classList.remove('show')
    updateBtnState()
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg')
  el.textContent = msg
  el.classList.add('show')
}

function showResult(info) {
  const t = i18n[lang]
  const name = info.name || '-'
  document.getElementById('resultName').textContent = name
  document.getElementById('avatarText').textContent = name.charAt(0)
  document.getElementById('resultOrg').textContent = info.organization || '-'
  document.getElementById('resultIdentity').textContent = info.identityType || '-'

  const checkedIn = info.checkinStatus === 1 || info.checkin_status === 1
  document.getElementById('resultStatus').innerHTML =
    `<span class="status-tag ${checkedIn ? 'checked' : 'unchecked'}">${checkedIn ? t.checked : t.unchecked}</span>`

  if (info.seatNo || info.seat_no) {
    document.getElementById('seatItem').style.display = ''
    document.getElementById('resultSeat').textContent = info.seatNo || info.seat_no
  }
  if (info.tableNo || info.table_no) {
    document.getElementById('tableItem').style.display = ''
    document.getElementById('resultTable').textContent = info.tableNo || info.table_no
  }
  if (info.hotelName || info.hotel_name) {
    document.getElementById('hotelItem').style.display = ''
    document.getElementById('resultHotel').textContent = info.hotelName || info.hotel_name
  }
  if (info.roomNo || info.room_no) {
    document.getElementById('roomItem').style.display = ''
    document.getElementById('resultRoom').textContent = info.roomNo || info.room_no
  }
  if (info.diningPlace || info.dining_place) {
    document.getElementById('diningItem').style.display = ''
    document.getElementById('resultDining').textContent = info.diningPlace || info.dining_place
  }

  document.getElementById('resultCard').classList.add('show')
}

async function loadSchedules() {
  try {
    const resp = await fetch(API_BASE + '/api/h5/getSchedules')
    const data = await resp.json()
    if (data.code === 200 && data.data && data.data.length > 0) {
      const list = document.getElementById('scheduleList')
      list.innerHTML = data.data.map(s => `
        <div class="schedule-item">
          <div class="schedule-time">${s.startTime || ''}<br/>${s.endTime ? '– ' + s.endTime : ''}</div>
          <div class="schedule-info">
            <div class="sch-title">${s.title || ''}</div>
            <div class="sch-sub">${s.location || ''} ${s.speaker ? '· ' + s.speaker : ''}</div>
          </div>
        </div>
      `).join('')
      document.getElementById('scheduleCard').classList.add('show')
    }
  } catch (e) { /* ignore */ }
}
</script>
