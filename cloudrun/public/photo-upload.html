<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>摄影师上传</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&family=DM+Sans:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:#0a1628;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px}
.header{text-align:center;margin:40px 0 32px}
.header h1{font-size:22px;font-weight:700;margin-bottom:6px}
.header p{font-size:13px;color:rgba(255,255,255,0.4)}
.upload-area{
  width:100%;max-width:400px;
  border:2px dashed rgba(255,255,255,0.2);
  border-radius:16px;padding:48px 24px;
  text-align:center;cursor:pointer;
  transition:all .3s;position:relative;
}
.upload-area:hover,.upload-area.dragover{
  border-color:rgba(58,138,238,0.6);
  background:rgba(58,138,238,0.08);
}
.upload-icon{font-size:48px;margin-bottom:16px;opacity:0.5}
.upload-text{font-size:16px;color:rgba(255,255,255,0.6);margin-bottom:8px}
.upload-hint{font-size:12px;color:rgba(255,255,255,0.3)}
.upload-input{display:none}
.preview-area{
  width:100%;max-width:400px;margin-top:24px;
  display:none;
}
.preview-area.show{display:block}
.preview-img{width:100%;border-radius:12px;margin-bottom:16px}
.upload-btn{
  width:100%;height:52px;
  background:linear-gradient(135deg,#1e40af,#3a8aee);
  border:none;border-radius:12px;
  font-size:16px;font-weight:700;color:#fff;cursor:pointer;
  box-shadow:0 8px 24px rgba(30,64,175,0.3);
  transition:all .3s;font-family:'Noto Sans SC',sans-serif;
}
.upload-btn:active{transform:scale(0.97)}
.upload-btn:disabled{opacity:0.5;cursor:not-allowed}
.upload-btn.loading{pointer-events:none}
.msg{
  margin-top:20px;padding:12px 20px;
  border-radius:10px;font-size:14px;
  width:100%;max-width:400px;text-align:center;
  display:none;
}
.msg.show{display:block}
.msg.success{background:rgba(16,185,129,0.15);color:#10b981;border:1px solid rgba(16,185,129,0.3)}
.msg.error{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3)}
.history{width:100%;max-width:400px;margin-top:32px}
.history h3{font-size:14px;color:rgba(255,255,255,0.4);margin-bottom:12px}
.history-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.history-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px}
</style>
</head>
<body>
<div class="header">
  <h1>📷 摄影师上传</h1>
  <p>选择照片后上传，图片将实时显示在图文直播</p>
</div>

<div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
  <div class="upload-icon">📁</div>
  <div class="upload-text">点击选择照片</div>
  <div class="upload-hint">支持 JPG、PNG 格式</div>
  <input class="upload-input" id="fileInput" type="file" accept="image/*" multiple>
</div>

<div class="preview-area" id="previewArea">
  <img class="preview-img" id="previewImg">
  <input class="upload-btn" id="uploadBtn" type="button" value="上传照片" onclick="doUpload()">
</div>

<div class="msg" id="msg"></div>

<div class="history" id="historyArea" style="display:none">
  <h3>已上传</h3>
  <div class="history-grid" id="historyGrid"></div>
</div>

<script>
const API_BASE = '';

document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    document.getElementById('previewImg').src = ev.target.result;
    document.getElementById('previewArea').classList.add('show');
    document.getElementById('msg').classList.remove('show');
  };
  reader.readAsDataURL(file);
});

// Drag and drop
const area = document.getElementById('uploadArea');
area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('dragover'); });
area.addEventListener('dragleave', () => area.classList.remove('dragover'));
area.addEventListener('drop', e => {
  e.preventDefault(); area.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    document.getElementById('fileInput').files = e.dataTransfer.files;
    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById('previewImg').src = ev.target.result;
      document.getElementById('previewArea').classList.add('show');
    };
    reader.readAsDataURL(file);
  }
});

async function doUpload() {
  const fileInput = document.getElementById('fileInput');
  const file = fileInput.files[0];
  if (!file) return;

  const btn = document.getElementById('uploadBtn');
  btn.value = '上传中...';
  btn.disabled = true;
  btn.classList.add('loading');

  try {
    // Convert to base64
    const base64 = await fileToBase64(file);

    const resp = await fetch(API_BASE + '/api/admin/live-images', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        url: base64,
        title: '现场照片 ' + new Date().toLocaleTimeString(),
        sortOrder: Date.now(),
        visible: 1
      })
    });
    const data = await resp.json();

    if (data.code === 200) {
      showMsg('上传成功！', 'success');
      fileInput.value = '';
      document.getElementById('previewArea').classList.remove('show');
    } else {
      showMsg('上传失败: ' + (data.message || '未知错误'), 'error');
    }
  } catch (err) {
    showMsg('上传失败: ' + err.message, 'error');
  } finally {
    btn.value = '上传照片';
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg show ' + type;
  setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
</body>
</html>
